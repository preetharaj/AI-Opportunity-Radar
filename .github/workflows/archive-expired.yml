name: Archive Expired Opportunities

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive-expired:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Archive expired opportunities
        run: node scripts/archive-expired.mjs --write

      - name: Commit archived changes
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add content/
          git diff --staged --quiet || git commit -m "chore: auto-archive expired opportunities"
          git push